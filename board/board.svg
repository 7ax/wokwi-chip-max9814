<svg xmlns="http://www.w3.org/2000/svg" width="72" height="48" viewBox="0 0 72 48">
  <!-- Purple PCB -->
  <rect x="0" y="0" width="72" height="48" rx="2" ry="2" fill="#4B0082"/>

  <!-- Electret mic element -->
  <circle cx="36" cy="18" r="8" fill="#333" stroke="#888" stroke-width="1"/>
  <circle cx="36" cy="18" r="2" fill="#555"/>

  <!-- Silkscreen text -->
  <text x="36" y="34" text-anchor="middle" fill="white" font-family="monospace" font-size="6">MAX9814</text>

  <!-- Pin pads (bottom edge, evenly spaced: centers at 8,22,36,50,64) -->
  <rect id="pin-VCC"  x="4"  y="40" width="8" height="6" rx="1" fill="#C0C0C0"/>
  <rect id="pin-GND"  x="18" y="40" width="8" height="6" rx="1" fill="#C0C0C0"/>
  <rect id="pin-OUT"  x="32" y="40" width="8" height="6" rx="1" fill="#C0C0C0"/>
  <rect id="pin-GAIN" x="46" y="40" width="8" height="6" rx="1" fill="#C0C0C0"/>
  <rect id="pin-AR"   x="60" y="40" width="8" height="6" rx="1" fill="#C0C0C0"/>

  <!-- Pin labels -->
  <text x="8"  y="39" text-anchor="middle" fill="#CCC" font-family="monospace" font-size="3.5">VCC</text>
  <text x="22" y="39" text-anchor="middle" fill="#CCC" font-family="monospace" font-size="3.5">GND</text>
  <text x="36" y="39" text-anchor="middle" fill="#CCC" font-family="monospace" font-size="3.5">OUT</text>
  <text x="50" y="39" text-anchor="middle" fill="#CCC" font-family="monospace" font-size="3.5">GAIN</text>
  <text x="64" y="39" text-anchor="middle" fill="#CCC" font-family="monospace" font-size="3.5">AR</text>
</svg>
